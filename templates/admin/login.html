<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Emissor Fiscal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --primary: #153259; --accent: #a2242b; --border: #dde1e7; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #153259 0%, #234e83 50%, #a2242b 100%);
    }
    .card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.25);
      padding: 2.75rem 2.25rem; width: 100%; max-width: 380px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem;
    }
    .brand-icon {
      width: 42px; height: 42px; border-radius: 10px;
      background: linear-gradient(135deg, #153259, #a2242b);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 20px; flex-shrink: 0;
    }
    .brand-text { line-height: 1.2; }
    .brand-name { font-size: 1rem; font-weight: 800; color: #153259; }
    .brand-sub  { font-size: .72rem; color: #6b7280; }
    h2 { font-size: .9rem; font-weight: 600; color: #1a1f2e; margin-bottom: 1.5rem; }
    label {
      display: block; font-size: .72rem; font-weight: 700;
      color: #4b5563; margin-bottom: .3rem;
      text-transform: uppercase; letter-spacing: .05em;
    }
    input {
      width: 100%; padding: .6rem .85rem;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-size: .9rem; outline: none; margin-bottom: 1rem;
      transition: border-color .15s; color: #1a1f2e;
    }
    input:focus { border-color: var(--primary); }
    button {
      width: 100%; padding: .7rem;
      background: linear-gradient(90deg, #153259, #a2242b);
      color: #fff; border: none; border-radius: 6px;
      font-size: .875rem; font-weight: 700; cursor: pointer;
      letter-spacing: .04em; text-transform: uppercase;
      transition: opacity .15s;
    }
    button:hover { opacity: .9; }
    .erro {
      background: #fef2f2; border: 1px solid #f5c6c6;
      color: #c0392b; border-radius: 6px;
      padding: .6rem .85rem; font-size: .83rem; margin-bottom: 1rem;
    }
    .badges { display: flex; gap: .4rem; margin-top: 1.25rem; justify-content: center; }
    .badge {
      font-size: .62rem; font-weight: 700; padding: 2px 7px;
      border-radius: 4px; color: #fff;
    }
    .badge-55 { background: #1a5c96; }
    .badge-65 { background: #7c3aed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">&#x1F4CB;</div>
      <div class="brand-text">
        <div class="brand-name">Emissor Fiscal</div>
        <div class="brand-sub">NF-e &amp; NFC-e — Layout 4.00</div>
      </div>
    </div>
    <h2>Acesse o painel administrativo</h2>
    {% if erro %}
      <div class="erro">{{ erro }}</div>
    {% endif %}
    <form method="POST">
      <label for="usuario">Usuário</label>
      <input type="text" name="usuario" id="usuario" required autofocus>
      <label for="senha">Senha</label>
      <input type="password" name="senha" id="senha" required>
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
